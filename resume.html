<!DOCTYPE html>

<html lang="en">

<head>
    <title>User Registration</title>
    <style>
        body {
            font-family: Arial;
            background-color: #eef1f3;
            text-align: center;
        }

        .resume-box {
            width: 500px;
            margin: 40px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            text-align: left;
        }

        img {
            width: 150px;
            height: 150px;
            border-radius: 10px;
            display: block;
            margin: auto;
        }

        h2 {
            text-align: center;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <div class="resume-box">
        <img src="{{image_path}}" alt="Profile Photo">
        <h2>{{ fullname }}</h2>
        <p><strong>Address</strong> {{address}} </p>
        <p><strong>Email</strong> {{email}}</p>
        <p><strong>Mobile</strong> {{mobile}}</p>
        <p><strong>Skills</strong>{{skills}}</p>
    </div>
</body>

</html>
